<!DOCTYPE html>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#EDEDE9;font-family:'Outfit',sans-serif;font-weight:200;color:#1B4332;padding:60px 40px}

<body>
<h1>matcha & me</h1>
<div class="subtitle">M mark v9 — #67 to #100</div>
<div id="app"></div>
<script>
const D={};
const M=(c,x,y,w,h)=>{const s=w*.07;c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.14);c.lineTo(x+s,y+h);c.closePath();};

// 67: Trapezoid — 全体が台形（上が狭い）
D['67']=(c,x,y,w,h)=>{const s=w*.07,t=w*.10;c.beginPath();c.moveTo(x-t,y+h);c.lineTo(x+t,y);c.lineTo(x+t+s,y);c.lineTo(x+w/2,y+h*.72);c.lineTo(x+w-t-s,y);c.lineTo(x+w-t,y);c.lineTo(x+w+t,y+h);c.lineTo(x+w+t-s,y+h);c.lineTo(x+w-t-s,y+h*.10);c.lineTo(x+w/2,y+h*.82);c.lineTo(x+t+s,y+h*.10);c.lineTo(x-t+s,y+h);c.closePath();c.fill();};

// 68: Inverted Trapezoid — 逆台形（上が広い）
D['68']=(c,x,y,w,h)=>{const s=w*.07,t=w*.08;c.beginPath();c.moveTo(x+t,y+h);c.lineTo(x-t,y);c.lineTo(x-t+s,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w+t-s,y);c.lineTo(x+w+t,y);c.lineTo(x+w-t,y+h);c.lineTo(x+w-t-s,y+h);c.lineTo(x+w+t-s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x-t+s,y+h*.14);c.lineTo(x+t+s,y+h);c.closePath();c.fill();};

// 69: Barbell — 上下に太いバー、間が細い
D['69']=(c,x,y,w,h)=>{const s=w*.07,bar=h*.08;c.fillRect(x,y,w,bar);c.fillRect(x,y+h-bar,w,bar);c.fillRect(x,y+bar,s,h-bar*2);c.fillRect(x+w-s,y+bar,s,h-bar*2);c.beginPath();c.moveTo(x+s,y+bar);c.lineTo(x+s+s,y+bar);c.lineTo(x+w/2+s*.3,y+h*.65);c.lineTo(x+w/2-s*.3,y+h*.65);c.fill();c.beginPath();c.moveTo(x+w-s,y+bar);c.lineTo(x+w-s-s,y+bar);c.lineTo(x+w/2-s*.3,y+h*.65);c.lineTo(x+w/2+s*.3,y+h*.65);c.fill();c.beginPath();c.moveTo(x+s,y+h-bar);c.lineTo(x+s+s,y+h-bar);c.lineTo(x+w/2+s*.3,y+h*.35);c.lineTo(x+w/2-s*.3,y+h*.35);c.fill();c.beginPath();c.moveTo(x+w-s,y+h-bar);c.lineTo(x+w-s-s,y+h-bar);c.lineTo(x+w/2-s*.3,y+h*.35);c.lineTo(x+w/2+s*.3,y+h*.35);c.fill();};

// 70: Pointed Base — 脚の底が尖る
D['70']=(c,x,y,w,h)=>{const s=w*.07,p=h*.08;c.beginPath();c.moveTo(x+s/2,y+h);c.lineTo(x,y+h-p);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h-p);c.lineTo(x+w-s/2,y+h);c.lineTo(x+w-s,y+h-p);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.14);c.lineTo(x+s,y+h-p);c.closePath();c.fill();};

// 71: Keystone — 頂点が台形（キーストーン）
D['71']=(c,x,y,w,h)=>{const s=w*.07,kw=w*.10,kh=h*.10;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+kh);c.lineTo(x-kw/2,y);c.lineTo(x+s+kw/2,y);c.lineTo(x+s,y+kh);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y+kh);c.lineTo(x+w-s-kw/2,y);c.lineTo(x+w+kw/2,y);c.lineTo(x+w,y+kh);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.18);c.lineTo(x+w/2,y+h*.90);c.lineTo(x+s,y+h*.18);c.lineTo(x+s,y+h);c.closePath();c.fill();};

// 72: Dashed Outline — 破線のアウトライン
D['72']=(c,x,y,w,h)=>{const lw=w*.05;c.save();c.strokeStyle=c.fillStyle;c.lineWidth=lw;c.setLineDash([lw*2,lw*1.5]);c.lineJoin='miter';c.beginPath();c.moveTo(x+lw/2,y+h-lw/2);c.lineTo(x+lw/2,y+lw/2);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-lw/2,y+lw/2);c.lineTo(x+w-lw/2,y+h-lw/2);c.stroke();c.beginPath();c.moveTo(x+lw*2,y+h-lw/2);c.lineTo(x+w/2,y+h*.22);c.lineTo(x+w-lw*2,y+h-lw/2);c.stroke();c.restore();};

// 73: Rounded Top Sharp Bottom — 上丸下尖
D['73']=(c,x,y,w,h)=>{const s=w*.07,r=w*.12;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.lineTo(x+s,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.14);c.lineTo(x+s,y+h);c.closePath();c.fill();};

// 74: Double V — 内側にVが二重
D['74']=(c,x,y,w,h)=>{const s=w*.055;c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);
c.beginPath();c.moveTo(x+s,y);c.lineTo(x+s+s,y);c.lineTo(x+w/2+s*.3,y+h*.55);c.lineTo(x+w/2-s*.3,y+h*.55);c.fill();
c.beginPath();c.moveTo(x+w-s,y);c.lineTo(x+w-s-s,y);c.lineTo(x+w/2-s*.3,y+h*.55);c.lineTo(x+w/2+s*.3,y+h*.55);c.fill();
c.beginPath();c.moveTo(x+s,y+h);c.lineTo(x+s+s,y+h);c.lineTo(x+w/2+s*.3,y+h*.45);c.lineTo(x+w/2-s*.3,y+h*.45);c.fill();
c.beginPath();c.moveTo(x+w-s,y+h);c.lineTo(x+w-s-s,y+h);c.lineTo(x+w/2-s*.3,y+h*.45);c.lineTo(x+w/2+s*.3,y+h*.45);c.fill();
// Second V set (shallower)
c.beginPath();c.moveTo(x+s,y);c.lineTo(x+s+s*.6,y);c.lineTo(x+w/2+s*.2,y+h*.32);c.lineTo(x+w/2-s*.2,y+h*.32);c.fill();
c.beginPath();c.moveTo(x+w-s,y);c.lineTo(x+w-s-s*.6,y);c.lineTo(x+w/2-s*.2,y+h*.32);c.lineTo(x+w/2+s*.2,y+h*.32);c.fill();
c.beginPath();c.moveTo(x+s,y+h);c.lineTo(x+s+s*.6,y+h);c.lineTo(x+w/2+s*.2,y+h*.68);c.lineTo(x+w/2-s*.2,y+h*.68);c.fill();
c.beginPath();c.moveTo(x+w-s,y+h);c.lineTo(x+w-s-s*.6,y+h);c.lineTo(x+w/2-s*.2,y+h*.68);c.lineTo(x+w/2+s*.2,y+h*.68);c.fill();};

// 75: Speedlines — 右に流れるスピードライン
D['75']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();M(c,x,y,w,h);c.fill();
c.save();c.globalCompositeOperation='destination-out';
for(let i=0;i<4;i++){const ly=y+h*.2+i*h*.18;c.fillRect(x+w*.15,ly,w*.7,s*.25);}
c.restore();};

// 76: Sprout — 山頂から芽が出る
D['76']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+h*.08);c.lineTo(x+s,y+h*.08);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y+h*.08);c.lineTo(x+w,y+h*.08);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.16);c.lineTo(x+w/2,y+h*.88);c.lineTo(x+s,y+h*.16);c.lineTo(x+s,y+h);c.closePath();c.fill();
// Sprout from left peak
c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s*.5;c.lineCap='round';
c.beginPath();c.moveTo(x+s/2,y+h*.08);c.quadraticCurveTo(x+s/2,y-h*.08,x+w*.2,y-h*.06);c.stroke();
// Leaf
c.beginPath();c.ellipse(x+w*.22,y-h*.07,w*.05,w*.025,-.3,0,Math.PI*2);c.fill();
c.restore();};

// 77: Hourglass Center — 中央が砂時計型
D['77']=(c,x,y,w,h)=>{const s=w*.07;c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);
// Upper V
c.beginPath();c.moveTo(x+s,y);c.lineTo(x+s+s,y);c.lineTo(x+w/2+s*.2,y+h*.45);c.lineTo(x+w/2-s*.2,y+h*.45);c.fill();
c.beginPath();c.moveTo(x+w-s,y);c.lineTo(x+w-s-s,y);c.lineTo(x+w/2-s*.2,y+h*.45);c.lineTo(x+w/2+s*.2,y+h*.45);c.fill();
// Lower inverted V
c.beginPath();c.moveTo(x+s,y+h);c.lineTo(x+s+s,y+h);c.lineTo(x+w/2+s*.2,y+h*.55);c.lineTo(x+w/2-s*.2,y+h*.55);c.fill();
c.beginPath();c.moveTo(x+w-s,y+h);c.lineTo(x+w-s-s,y+h);c.lineTo(x+w/2-s*.2,y+h*.55);c.lineTo(x+w/2+s*.2,y+h*.55);c.fill();};

// 78: Tilted — 全体が少し傾いている
D['78']=(c,x,y,w,h)=>{c.save();c.translate(x+w/2,y+h/2);c.rotate(-.06);c.translate(-x-w/2,-y-h/2);const s=w*.07;c.beginPath();M(c,x,y,w,h);c.fill();c.restore();};

// 79: Half Circle Peaks — 山頂が半円
D['79']=(c,x,y,w,h)=>{const s=w*.07,r=s;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+r);c.arc(x+s/2,y+r,s/2,Math.PI,0,false);c.lineTo(x+s,y+h*.14);c.lineTo(x+w/2,y+h*.88);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w-s,y+r);c.arc(x+w-s/2,y+r,s/2,Math.PI,0,false);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.20);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.20);c.lineTo(x+s,y+h);c.closePath();c.fill();
// Outer diagonals
c.beginPath();c.moveTo(x+s/2,y+r);c.lineTo(x+s*1.5,y+r);c.lineTo(x+w/2+s*.3,y+h*.78);c.lineTo(x+w/2-s*.3,y+h*.78);c.fill();
c.beginPath();c.moveTo(x+w-s/2,y+r);c.lineTo(x+w-s*1.5,y+r);c.lineTo(x+w/2-s*.3,y+h*.78);c.lineTo(x+w/2+s*.3,y+h*.78);c.fill();};

// 80: Arrow Down Valley — 谷に下向き矢印
D['80']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();M(c,x,y,w,h);c.fill();
const aw=w*.18,ah=h*.12,ay=y+h*.70;
c.save();c.globalCompositeOperation='destination-out';
c.beginPath();c.moveTo(x+w/2,ay+ah);c.lineTo(x+w/2-aw,ay);c.lineTo(x+w/2-aw*.4,ay);c.lineTo(x+w/2,ay+ah*.5);c.lineTo(x+w/2+aw*.4,ay);c.lineTo(x+w/2+aw,ay);c.closePath();c.fill();c.restore();};

// 81: Glitch — グリッチ（水平にずれた）
D['81']=(c,x,y,w,h)=>{const s=w*.07,shift=w*.06;
// Top third
c.save();c.beginPath();c.rect(x-w,y,w*3,h*.33);c.clip();
c.beginPath();M(c,x+shift,y,w,h);c.fill();c.restore();
// Middle third
c.save();c.beginPath();c.rect(x-w,y+h*.33,w*3,h*.34);c.clip();
c.beginPath();M(c,x-shift,y,w,h);c.fill();c.restore();
// Bottom third
c.save();c.beginPath();c.rect(x-w,y+h*.67,w*3,h*.33);c.clip();
c.beginPath();M(c,x+shift*.5,y,w,h);c.fill();c.restore();};

// 82: Gradient Fade — 上から下にフェード
D['82']=(c,x,y,w,h)=>{const s=w*.07,steps=12;for(let i=0;i<steps;i++){const t=i/steps,th=h/steps+1;c.save();c.globalAlpha=.15+t*.85;c.beginPath();c.rect(x-s,y+t*h,w+s*2,th);c.clip();c.beginPath();M(c,x,y,w,h);c.fill();c.restore();}};

// 83: Concentric — 同心のM（3重）
D['83']=(c,x,y,w,h)=>{
  [1,.7,.4].forEach((sc,i)=>{
    const sw=w*sc,sh=h*sc,sx=x+(w-sw)/2,sy=y+(h-sh)/2,st=sw*.06;
    c.save();c.globalAlpha=1-i*.3;c.strokeStyle=c.fillStyle;c.lineWidth=st;c.lineJoin='miter';
    c.beginPath();c.moveTo(sx+st/2,sy+sh);c.lineTo(sx+st/2,sy);c.lineTo(sx+sw/2,sy+sh*.75);c.lineTo(sx+sw-st/2,sy);c.lineTo(sx+sw-st/2,sy+sh);c.stroke();c.restore();
  });
};

// 84: Dot Valley — 谷底にドット
D['84']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();M(c,x,y,w,h);c.fill();
const r=w*.06;c.save();c.globalCompositeOperation='destination-out';c.beginPath();c.arc(x+w/2,y+h*.72,r,0,Math.PI*2);c.fill();c.restore();
c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s*.35;c.beginPath();c.arc(x+w/2,y+h*.72,r,0,Math.PI*2);c.stroke();c.restore();};

// 85: DNA Helix Valley — 二重螺旋の谷
D['85']=(c,x,y,w,h)=>{const s=w*.07;c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);
c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s*.6;c.lineCap='round';
const n=3;for(let i=0;i<n;i++){const t0=i/n,t1=(i+.5)/n;
const y0=y+h*.1+t0*h*.8,y1=y+h*.1+t1*h*.8;
c.beginPath();c.moveTo(x+s,y0);c.quadraticCurveTo(x+w/2,y0+h*.05,x+w-s,y1);c.stroke();
c.beginPath();c.moveTo(x+w-s,y0);c.quadraticCurveTo(x+w/2,y0+h*.05,x+s,y1);c.stroke();}
c.restore();};

// 86: Italic — 斜体のM
D['86']=(c,x,y,w,h)=>{const s=w*.07,sk=w*.12;c.save();c.transform(1,0,-sk/h,1,sk,0);c.beginPath();M(c,x,y,w,h);c.fill();c.restore();};

// 87: Rotated 90 — 90度回転（横倒し）
D['87']=(c,x,y,w,h)=>{c.save();c.translate(x+w/2,y+h/2);c.rotate(Math.PI/2);c.translate(-w/2,-h/2);const s=w*.07;c.beginPath();c.moveTo(0,h);c.lineTo(0,0);c.lineTo(s,0);c.lineTo(w/2,h*.78);c.lineTo(w-s,0);c.lineTo(w,0);c.lineTo(w,h);c.lineTo(w-s,h);c.lineTo(w-s,h*.14);c.lineTo(w/2,h*.92);c.lineTo(s,h*.14);c.lineTo(s,h);c.closePath();c.fill();c.restore();};

// 88: Blurred Edge — 縁がにじむ（多重描画）
D['88']=(c,x,y,w,h)=>{for(let i=4;i>=0;i--){c.save();c.globalAlpha=i===0?1:.06;const off=i*1.2;c.beginPath();M(c,x-off,y-off,w+off*2,h+off*2);c.fill();c.restore();}};

// 89: Spiral Valley — 谷が渦巻き
D['89']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();M(c,x,y,w,h);c.fill();
c.save();c.globalCompositeOperation='destination-out';
const cx=x+w/2,cy=y+h*.65,turns=2.5,pts=60;
c.beginPath();
for(let i=0;i<=pts;i++){const t=i/pts,angle=t*turns*Math.PI*2-Math.PI/2,r=w*.02+t*w*.08;c.lineTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);}
c.lineWidth=s*.4;c.strokeStyle=c.fillStyle;c.stroke();c.restore();};

// 90: Origami — 折り紙的な面分割
D['90']=(c,x,y,w,h)=>{const s=w*.07;
// Left face (full)
c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+s,y);c.lineTo(x,y);c.closePath();
c.moveTo(x,y+h);c.lineTo(x+s,y+h);c.lineTo(x+s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.closePath();c.fill();
// Right face (lighter)
c.save();c.globalAlpha=.55;
c.beginPath();c.moveTo(x+w,y+h);c.lineTo(x+w,y);c.lineTo(x+w-s,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w-s,y+h);c.closePath();c.fill();
c.restore();};

// 91: Neon — 二重線でネオン風
D['91']=(c,x,y,w,h)=>{const lw=w*.03;
c.save();c.strokeStyle=c.fillStyle;c.lineCap='round';c.lineJoin='round';
[lw*3,lw].forEach((sw,i)=>{c.lineWidth=sw;c.globalAlpha=i===0?.15:1;
c.beginPath();c.moveTo(x+sw,y+h);c.lineTo(x+sw,y+sw);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-sw,y+sw);c.lineTo(x+w-sw,y+h);c.stroke();
c.beginPath();c.moveTo(x+sw*2.5,y+h);c.lineTo(x+w/2,y+h*.22);c.lineTo(x+w-sw*2.5,y+h);c.stroke();});
c.restore();};

// 92: Wave Outline — 波打つアウトライン
D['92']=(c,x,y,w,h)=>{const lw=w*.05,amp=w*.02,freq=12;
c.save();c.strokeStyle=c.fillStyle;c.lineWidth=lw;c.lineCap='round';c.lineJoin='round';
// Draw M as wobbling line
const wobble=(x1,y1,x2,y2)=>{c.beginPath();const steps=30;for(let i=0;i<=steps;i++){const t=i/steps;const px=x1+(x2-x1)*t;const py=y1+(y2-y1)*t;const off=Math.sin(t*freq)*amp;c.lineTo(px+off,py);}c.stroke();};
wobble(x+lw,y+h,x+lw,y+lw);wobble(x+lw,y+lw,x+w/2,y+h*.75);wobble(x+w/2,y+h*.75,x+w-lw,y+lw);wobble(x+w-lw,y+lw,x+w-lw,y+h);
wobble(x+lw*2.5,y+h,x+w/2,y+h*.25);wobble(x+w/2,y+h*.25,x+w-lw*2.5,y+h);
c.restore();};

// 93: Maze — 迷路パターン
D['93']=(c,x,y,w,h)=>{const s=w*.05,g=s*.8;
c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s;c.lineCap='square';
// Outer M path
c.beginPath();c.moveTo(x+s/2,y+h);c.lineTo(x+s/2,y+s/2);c.lineTo(x+w/2,y+h*.72);c.lineTo(x+w-s/2,y+s/2);c.lineTo(x+w-s/2,y+h);c.stroke();
// Inner path offset
c.beginPath();c.moveTo(x+s+g+s/2,y+h);c.lineTo(x+s+g+s/2,y+s+g);c.lineTo(x+w/2,y+h*.72+g*1.5);c.lineTo(x+w-s-g-s/2,y+s+g);c.lineTo(x+w-s-g-s/2,y+h);c.stroke();
// Connecting segments
c.beginPath();c.moveTo(x+s/2,y+h);c.lineTo(x+s+g+s/2,y+h);c.stroke();
c.beginPath();c.moveTo(x+w-s/2,y+h);c.lineTo(x+w-s-g-s/2,y+h);c.stroke();
c.restore();};

// 94: Circuit Board — 回路基板風（直角のみ）
D['94']=(c,x,y,w,h)=>{const s=w*.06;c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);
// Diagonals as stepped right-angles
const steps=4;for(let i=0;i<steps;i++){const t=i/steps,t1=(i+1)/steps;
const sx=x+s+(w/2-s)*t,sx1=x+s+(w/2-s)*t1;const sy=y+h*.1*t,sy1=y+h*.1*t1;
c.fillRect(sx,y+h*.05+i*(h*.18),sx1-sx,s);c.fillRect(sx1-s,y+h*.05+i*(h*.18),s,(i+1)*(h*.18)-i*(h*.18));
// Mirror right
const rx=x+w-s-(w/2-s)*t,rx1=x+w-s-(w/2-s)*t1;
c.fillRect(rx1,y+h*.05+i*(h*.18),rx-rx1,s);c.fillRect(rx1,y+h*.05+i*(h*.18),s,(i+1)*(h*.18)-i*(h*.18));}
// Bottom mirror
for(let i=0;i<steps;i++){const sx=x+s+(w/2-s)*(i/steps),sx1=x+s+(w/2-s)*((i+1)/steps);
c.fillRect(sx,y+h-.05*h-i*(h*.18)-s,sx1-sx,s);
const rx=x+w-s-(w/2-s)*(i/steps),rx1=x+w-s-(w/2-s)*((i+1)/steps);
c.fillRect(rx1,y+h-.05*h-i*(h*.18)-s,rx-rx1,s);}};

// 95: Torn — 破れた紙のようなエッジ
D['95']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();M(c,x,y,w,h);c.fill();
c.save();c.globalCompositeOperation='destination-out';
// Tear along left edge
c.beginPath();c.moveTo(x-1,y);
const seed=[.3,.7,.2,.8,.4,.6,.5,.3,.9,.1,.7,.4,.6,.8,.2,.5];let si=0;
for(let py=y;py<y+h;py+=h*.03){c.lineTo(x+s*.3*seed[si++%seed.length]-s*.05,py);}
c.lineTo(x-1,y+h);c.closePath();c.fill();
// Tear along right edge
c.beginPath();c.moveTo(x+w+1,y);si=5;
for(let py=y;py<y+h;py+=h*.03){c.lineTo(x+w-s*.3*seed[si++%seed.length]+s*.05,py);}
c.lineTo(x+w+1,y+h);c.closePath();c.fill();
c.restore();};

// 96: Interlock — 左右のMが噛み合う
D['96']=(c,x,y,w,h)=>{const s=w*.06,notch=h*.08,nn=4;
c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);
// Notches on inner edges
for(let i=0;i<nn;i++){const ny=y+h*.1+i*(h*.8/nn);
c.fillRect(x+s,ny,s*.6,notch);c.fillRect(x+w-s-s*.6,ny+notch*.5,s*.6,notch);}
// Diagonals
c.beginPath();c.moveTo(x+s,y);c.lineTo(x+s+s,y);c.lineTo(x+w/2+s*.3,y+h*.78);c.lineTo(x+w/2-s*.3,y+h*.78);c.fill();
c.beginPath();c.moveTo(x+w-s,y);c.lineTo(x+w-s-s,y);c.lineTo(x+w/2-s*.3,y+h*.78);c.lineTo(x+w/2+s*.3,y+h*.78);c.fill();
c.beginPath();c.moveTo(x+s,y+h);c.lineTo(x+s+s,y+h);c.lineTo(x+w/2+s*.3,y+h*.25);c.lineTo(x+w/2-s*.3,y+h*.25);c.fill();
c.beginPath();c.moveTo(x+w-s,y+h);c.lineTo(x+w-s-s,y+h);c.lineTo(x+w/2-s*.3,y+h*.25);c.lineTo(x+w/2+s*.3,y+h*.25);c.fill();};

// 97: Negative Circle — 円の中にネガティブM
D['97']=(c,x,y,w,h)=>{const r=Math.min(w,h)*.52,cx=x+w/2,cy=y+h/2;
c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();
c.save();c.globalCompositeOperation='destination-out';
const ms=r*1.3,mx=cx-ms/2,my=cy-ms*.42;const s=ms*.07;
c.beginPath();c.moveTo(mx,my+ms*.84);c.lineTo(mx,my);c.lineTo(mx+s,my);c.lineTo(mx+ms/2,my+ms*.65);c.lineTo(mx+ms-s,my);c.lineTo(mx+ms,my);c.lineTo(mx+ms,my+ms*.84);c.lineTo(mx+ms-s,my+ms*.84);c.lineTo(mx+ms-s,my+ms*.12);c.lineTo(mx+ms/2,my+ms*.77);c.lineTo(mx+s,my+ms*.12);c.lineTo(mx+s,my+ms*.84);c.closePath();c.fill();
c.restore();};

// 98: Hexagonal — 六角形ベース
D['98']=(c,x,y,w,h)=>{const s=w*.06;
// Hexagonal outer shape
const hw=w*.52,hh=h*.5;const cx=x+w/2,cy=y+h/2;
c.beginPath();c.moveTo(cx,cy-hh);c.lineTo(cx+hw,cy-hh*.5);c.lineTo(cx+hw,cy+hh*.5);c.lineTo(cx,cy+hh);c.lineTo(cx-hw,cy+hh*.5);c.lineTo(cx-hw,cy-hh*.5);c.closePath();c.fill();
// Cut out M
c.save();c.globalCompositeOperation='destination-out';
const mx=x+w*.18,my=y+h*.18,mw=w*.64,mh=h*.64,ms=mw*.08;
c.beginPath();c.moveTo(mx+ms,my+mh);c.lineTo(mx+ms,my+ms);c.lineTo(mx+mw/2,my+mh*.7);c.lineTo(mx+mw-ms,my+ms);c.lineTo(mx+mw-ms,my+mh);c.lineTo(mx+mw-ms*2,my+mh);c.lineTo(mx+mw/2,my+mh*.2);c.lineTo(mx+ms*2,my+mh);c.closePath();c.fill();
c.restore();};

// 99: Brush Dry — かすれた筆
D['99']=(c,x,y,w,h)=>{const s=w*.08;
c.save();const stripes=8,sw=s/stripes;
for(let i=0;i<stripes;i++){if(i%3===1)continue;// skip some for dry brush effect
c.save();c.beginPath();c.rect(x-w,y+i*h/stripes*0,w*3,h/stripes*.8);
// This is tricky, let's do it differently
c.restore();}c.restore();
// Simpler: draw M with horizontal stripe mask
c.beginPath();M(c,x,y,w,h);c.fill();
c.save();c.globalCompositeOperation='destination-out';
const n=14;for(let i=0;i<n;i++){if(i%3!==0)continue;c.fillRect(x-s,y+i*(h/n),w+s*2,h/n*.4);}
c.restore();};

// 100: Crown — 完成形: Round Valley + 頂点の微小カット
D['100']=(c,x,y,w,h)=>{const s=w*.07,notch=h*.04;
c.beginPath();
c.moveTo(x,y+h);c.lineTo(x,y+notch);
// Left peak tiny notch
c.lineTo(x+s*.3,y);c.lineTo(x+s*.7,y+notch);
c.lineTo(x+s,y+notch);
// Inner round valley
c.lineTo(x+s,y+h*.2);
c.quadraticCurveTo(x+w/2,y+h*.92,x+w-s,y+h*.2);
c.lineTo(x+w-s,y+notch);
// Right peak tiny notch
c.lineTo(x+w-s*.7,y+notch);c.lineTo(x+w-s*.3,y);c.lineTo(x+w,y+notch);
c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.28);
c.quadraticCurveTo(x+w/2,y+h*1.0,x+s,y+h*.28);
c.lineTo(x+s,y+h);c.closePath();c.fill();};

function renderWordmark(canvas,drawFn){const dpr=window.devicePixelRatio||2,fs=48,font=`200 ${fs}px Outfit`,ls=fs*.35,color='#1B4332',chars=['M','A','T','C','H','A','&','M','E'];const ctx=canvas.getContext('2d');ctx.font=font;const cw=chars.map(c=>ctx.measureText(c).width),tw=cw.reduce((a,b)=>a+b,0)+ls*(chars.length-1);const m=ctx.measureText('M'),asc=m.actualBoundingBoxAscent,desc=m.actualBoundingBoxDescent;const px=40,py=20,W=tw+px*2,H=asc+desc+py*2;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(dpr,dpr);const by=py+asc;ctx.font=font;ctx.fillStyle=color;ctx.textBaseline='alphabetic';let cx=px;chars.forEach((ch,i)=>{if(ch==='M')drawFn(ctx,cx,by-asc,cw[i],asc);else ctx.fillText(ch,cx,by);cx+=cw[i]+ls;});}
function renderMark(canvas,drawFn,bg,fg){const dpr=window.devicePixelRatio||2,sz=72;canvas.width=sz*dpr;canvas.height=sz*dpr;canvas.style.width=sz+'px';canvas.style.height=sz+'px';const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.fillStyle=bg;ctx.fillRect(0,0,sz,sz);const ms=34,p=(sz-ms)/2;ctx.fillStyle=fg;drawFn(ctx,p,p+1,ms,ms-2);}
function build(){const app=document.getElementById('app');let html='';CONCEPTS.forEach(c=>{if(c.divider)html+=`<div class="divider">${c.divider}</div>`;html+=`<div class="concept"><div class="concept-header"><h2>${c.name}</h2><span class="tag">${c.tag}</span></div><p class="desc">${c.desc}</p><div class="wordmark-canvas-wrap"><canvas id="wm-${c.id}"></canvas></div><div class="mark-display"><div class="mark-cell"><div class="box light"><canvas id="mk-${c.id}-l"></canvas></div><div class="label">light</div></div><div class="mark-cell"><div class="box dark"><canvas id="mk-${c.id}-d"></canvas></div><div class="label">dark</div></div><div class="mark-cell"><div class="box green"><canvas id="mk-${c.id}-g"></canvas></div><div class="label">sage</div></div><div class="mark-cell"><div class="box pink"><canvas id="mk-${c.id}-p"></canvas></div><div class="label">sakura</div></div></div></div>`;});app.innerHTML=html;document.fonts.ready.then(()=>{CONCEPTS.forEach(c=>{const fn=D[c.id];renderWordmark(document.getElementById(`wm-${c.id}`),fn);renderMark(document.getElementById(`mk-${c.id}-l`),fn,'#FAFAF8','#1B4332');renderMark(document.getElementById(`mk-${c.id}-d`),fn,'#1B4332','#F5F0E8');renderMark(document.getElementById(`mk-${c.id}-g`),fn,'#8AAE92','#1B4332');renderMark(document.getElementById(`mk-${c.id}-p`),fn,'#F2C4C4','#1B4332');});});}
