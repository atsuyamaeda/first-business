<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MATCHA&ME — Color Compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#EDEDE9;font-family:'Outfit',sans-serif;font-weight:200;color:#1B4332;padding:60px 30px}
  h1{text-align:center;font-weight:200;font-size:13px;letter-spacing:8px;text-transform:uppercase;margin-bottom:6px;color:#888}
  .subtitle{text-align:center;font-size:10px;color:#aaa;margin-bottom:50px;letter-spacing:1px}
  .compare{max-width:1200px;margin:0 auto 50px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .panel{background:#fff;padding:40px 30px 30px;text-align:center}
  .panel h2{font-weight:200;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#999;margin-bottom:4px}
  .panel .color-code{font-size:10px;color:#bbb;letter-spacing:1px;margin-bottom:20px;display:block}
  .panel .color-swatch{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:4px;border:1px solid #eee}
  .wordmark-wrap{margin:0 auto 16px}
  .wordmark-wrap canvas{display:block;margin:0 auto}
  .large-mark{margin:0 auto 16px}
  .large-mark canvas{display:block;margin:0 auto}
  .mark-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding-top:14px;border-top:1px solid #f0f0f0}
  .mark-cell{text-align:center}
  .mark-cell .box{width:56px;height:56px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
  .mark-cell .box.light{background:#FAFAF8;border:1px solid #f0f0f0}
  .mark-cell .box.dark{background:#1B4332}
  .mark-cell .box.green{background:#8AAE92}
  .mark-cell .box.pink{background:#F2C4C4}
  .mark-cell .label{font-size:7px;color:#ccc;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>

<h1>matcha & me</h1>
<div class="subtitle">Text Color Comparison — Black vs Off-Black</div>

<div class="compare">
  <!-- Left: Current -->
  <div class="panel">
    <h2>Current</h2>
    <span class="color-code"><span class="color-swatch" style="background:#1A1A1A"></span>#1A1A1A — Black</span>
    <div class="wordmark-wrap"><canvas id="wm-a"></canvas></div>
    <div class="large-mark"><canvas id="lg-a"></canvas></div>
    <div class="mark-row">
      <div class="mark-cell"><div class="box light"><canvas id="mk-a-l"></canvas></div><div class="label">light</div></div>
      <div class="mark-cell"><div class="box dark"><canvas id="mk-a-d"></canvas></div><div class="label">dark</div></div>
      <div class="mark-cell"><div class="box green"><canvas id="mk-a-g"></canvas></div><div class="label">sage</div></div>
      <div class="mark-cell"><div class="box pink"><canvas id="mk-a-p"></canvas></div><div class="label">sakura</div></div>
    </div>
  </div>

  <!-- Right: Off-Black -->
  <div class="panel">
    <h2>Off-Black</h2>
    <span class="color-code"><span class="color-swatch" style="background:#4A4A4A"></span>#4A4A4A — Charcoal / weight 350</span>
    <div class="wordmark-wrap"><canvas id="wm-b"></canvas></div>
    <div class="large-mark"><canvas id="lg-b"></canvas></div>
    <div class="mark-row">
      <div class="mark-cell"><div class="box light"><canvas id="mk-b-l"></canvas></div><div class="label">light</div></div>
      <div class="mark-cell"><div class="box dark"><canvas id="mk-b-d"></canvas></div><div class="label">dark</div></div>
      <div class="mark-cell"><div class="box green"><canvas id="mk-b-g"></canvas></div><div class="label">sage</div></div>
      <div class="mark-cell"><div class="box pink"><canvas id="mk-b-p"></canvas></div><div class="label">sakura</div></div>
    </div>
  </div>
</div>

<script>
const CFG = {
  poolColor: '#3A6B4E',
  fontWeight: 200,
  letterSpacingRatio: 0.20,
  strokeRatio: 0.07,
  eyeY: 0.05,
  dotR: 0.03,
  waterRatio: 0.37,
};

function drawRoundM(ctx, x, y, w, h, sw) {
  ctx.beginPath();
  ctx.moveTo(x, y + h);
  ctx.lineTo(x, y);
  ctx.lineTo(x + sw, y);
  ctx.lineTo(x + sw, y + h * 0.2);
  ctx.quadraticCurveTo(x + w/2, y + h * 0.92, x + w - sw, y + h * 0.2);
  ctx.lineTo(x + w - sw, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x + w - sw, y + h);
  ctx.lineTo(x + w - sw, y + h * 0.28);
  ctx.quadraticCurveTo(x + w/2, y + h * 1.0, x + sw, y + h * 0.28);
  ctx.lineTo(x + sw, y + h);
  ctx.closePath();
  ctx.fill();
}

function drawPool(ctx, x, y, w, h, sw, waterRatio, poolColor) {
  const waterY = h * waterRatio;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x - 1, y + waterY, w + 2, h - waterY + 10);
  ctx.clip();
  ctx.fillStyle = poolColor;
  ctx.beginPath();
  ctx.moveTo(x + sw, y + h * 0.28);
  ctx.lineTo(x + w - sw, y + h * 0.28);
  ctx.quadraticCurveTo(x + w/2, y + h * 1.0, x + sw, y + h * 0.28);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawDotEyes(ctx, x, y, w, h, color) {
  const eyeY = y + h * CFG.eyeY;
  const r = w * CFG.dotR;
  const leftX = x + w * 0.33;
  const rightX = x + w * 0.67;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(leftX, eyeY, r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(rightX, eyeY, r, 0, Math.PI * 2); ctx.fill();
}

function drawMatchaM(ctx, x, y, w, h, mColor, poolColor, strokeOverride) {
  const sw = w * (strokeOverride || CFG.strokeRatio);
  drawPool(ctx, x, y, w, h, sw, CFG.waterRatio, poolColor);
  ctx.fillStyle = mColor;
  drawRoundM(ctx, x, y, w, h, sw);
}

function drawMeM(ctx, x, y, w, h, mColor, strokeOverride) {
  const sw = w * (strokeOverride || CFG.strokeRatio);
  ctx.fillStyle = mColor;
  drawRoundM(ctx, x, y, w, h, sw);
  drawDotEyes(ctx, x, y, w, h, mColor);
}

function renderWordmark(canvas, mColor, fontWeight, mStroke) {
  const dpr = window.devicePixelRatio || 2;
  const fs = 42;
  const fw = fontWeight || CFG.fontWeight;
  const font = `${fw} ${fs}px Outfit`;
  const ls = fs * CFG.letterSpacingRatio;
  const poolColor = CFG.poolColor;
  const chars = ['M','A','T','C','H','A','&','M','E'];

  const ctx = canvas.getContext('2d');
  ctx.font = font;
  const cw = chars.map(ch => ctx.measureText(ch).width);
  const tw = cw.reduce((a, b) => a + b, 0) + ls * (chars.length - 1);
  const m = ctx.measureText('M');
  const asc = m.actualBoundingBoxAscent;
  const desc = m.actualBoundingBoxDescent;
  const px = 24, py = 16;
  const W = tw + px * 2, H = asc + desc + py * 2;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const by = py + asc;
  ctx.font = font;
  ctx.textBaseline = 'alphabetic';

  let cx = px;
  let mCount = 0;
  chars.forEach((ch, i) => {
    if (ch === 'M') {
      mCount++;
      const mW = cw[i];
      const capTop = by - asc;
      if (mCount === 1) {
        drawMatchaM(ctx, cx, capTop, mW, asc, mColor, poolColor, mStroke);
      } else {
        drawMeM(ctx, cx, capTop, mW, asc, mColor, mStroke);
      }
    } else {
      ctx.fillStyle = mColor;
      ctx.fillText(ch, cx, by);
    }
    cx += cw[i] + ls;
  });
}

function renderMarkLarge(canvas, bg, mColor, mStroke) {
  const dpr = window.devicePixelRatio || 2;
  const sz = 130;
  canvas.width = sz * dpr;
  canvas.height = sz * dpr;
  canvas.style.width = sz + 'px';
  canvas.style.height = sz + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, sz, sz);
  const ms = 74, p = (sz - ms) / 2;
  drawMatchaM(ctx, p, p + 4, ms, ms - 8, mColor, CFG.poolColor, mStroke);
}

function renderMark(canvas, bg, mColor, mStroke) {
  const dpr = window.devicePixelRatio || 2;
  const sz = 56;
  canvas.width = sz * dpr;
  canvas.height = sz * dpr;
  canvas.style.width = sz + 'px';
  canvas.style.height = sz + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, sz, sz);
  const ms = 30, p = (sz - ms) / 2;
  drawMatchaM(ctx, p, p + 2, ms, ms - 4, mColor, CFG.poolColor, mStroke);
}

document.fonts.ready.then(() => {
  const BLACK = '#1A1A1A';
  const OFFBLACK = '#4A4A4A';

  // A: Current (black)
  renderWordmark(document.getElementById('wm-a'), BLACK);
  renderMarkLarge(document.getElementById('lg-a'), '#FAFAF8', BLACK);
  renderMark(document.getElementById('mk-a-l'), '#FAFAF8', BLACK);
  renderMark(document.getElementById('mk-a-d'), '#1B4332', '#F5F0E8');
  renderMark(document.getElementById('mk-a-g'), '#8AAE92', BLACK);
  renderMark(document.getElementById('mk-a-p'), '#F2C4C4', BLACK);

  // B: Off-Black (charcoal) — heavier weight to match APOTHÉKARY
  const HEAVY_WEIGHT = 350;
  const HEAVY_STROKE = 0.09;
  renderWordmark(document.getElementById('wm-b'), OFFBLACK, HEAVY_WEIGHT, HEAVY_STROKE);
  renderMarkLarge(document.getElementById('lg-b'), '#FAFAF8', OFFBLACK, HEAVY_STROKE);
  renderMark(document.getElementById('mk-b-l'), '#FAFAF8', OFFBLACK, HEAVY_STROKE);
  renderMark(document.getElementById('mk-b-d'), '#1B4332', '#F5F0E8', HEAVY_STROKE);
  renderMark(document.getElementById('mk-b-g'), '#8AAE92', OFFBLACK, HEAVY_STROKE);
  renderMark(document.getElementById('mk-b-p'), '#F2C4C4', OFFBLACK, HEAVY_STROKE);
});
</script>
</body>
</html>
