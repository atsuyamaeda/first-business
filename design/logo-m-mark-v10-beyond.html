<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#EDEDE9;font-family:'Outfit',sans-serif;font-weight:200;color:#1B4332;padding:60px 40px}

  .mark-cell .box.light{background:#FAFAF8;border:1px solid #f0f0f0}

  .divider{max-width:900px;margin:0 auto 50px;text-align:center;font-size:10px;letter-spacing:6px;text-transform:uppercase;color:#ccc}
  .divider::before,.divider::after{content:'';display:inline-block;width:60px;height:1px;background:#ddd;vertical-align:middle;margin:0 20px}
</style>

<body>
<h1>matcha & me</h1>
<div class="subtitle">M mark v10 — #101 to #140</div>
<div id="app"></div>
<script>
const D={};
const stdM=(c,x,y,w,h)=>{const s=w*.07;c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.14);c.lineTo(x+s,y+h);c.closePath();};

// 101: Ellipse Valley — 楕円の谷
D['101']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+s,y+h*.12);c.save();c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+s,y+h*.15);c.ellipse(x+w/2,y+h*.15,(w-s*2)/2,h*.62,0,Math.PI,0,true);c.lineTo(x+w-s,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.22);c.ellipse(x+w/2,y+h*.22,(w-s*2)/2-s,h*.55,0,0,Math.PI,false);c.lineTo(x+s,y+h);c.closePath();c.fill();c.restore();};

// 102: V-Cut Top — 上辺の中央をV字にカット
D['102']=(c,x,y,w,h)=>{const s=w*.07,vd=h*.12,vw=w*.20;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+w/2-vw,y);c.lineTo(x+w/2,y+vd);c.lineTo(x+w/2+vw,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.14);c.lineTo(x+s,y+h);c.closePath();c.fill();
c.save();c.globalCompositeOperation='destination-out';c.beginPath();c.moveTo(x+s,y+s);c.lineTo(x+w/2-vw+s,y+s);c.lineTo(x+w/2,y+vd+s*.5);c.lineTo(x+w/2+vw-s,y+s);c.lineTo(x+w-s,y+s);c.lineTo(x+w-s,y);c.lineTo(x+w/2+vw,y);c.lineTo(x+w/2,y+vd);c.lineTo(x+w/2-vw,y);c.lineTo(x+s,y);c.closePath();c.fill();c.restore();};

// 103: Peak Dot — 山頂にドット（シンプル）
D['103']=(c,x,y,w,h)=>{const s=w*.07,r=s*.7;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+r*2+s*.3);c.lineTo(x+s,y+r*2+s*.3);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s,y+r*2+s*.3);c.lineTo(x+w,y+r*2+s*.3);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.18);c.lineTo(x+w/2,y+h*.90);c.lineTo(x+s,y+h*.18);c.lineTo(x+s,y+h);c.closePath();c.fill();c.beginPath();c.arc(x+s/2,y+r,r,0,Math.PI*2);c.fill();c.beginPath();c.arc(x+w-s/2,y+r,r,0,Math.PI*2);c.fill();};

// 104: One Diagonal Only — 外側の対角線だけ（内側なし）
D['104']=(c,x,y,w,h)=>{const s=w*.07;c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);c.beginPath();c.moveTo(x+s,y);c.lineTo(x+s+s,y);c.lineTo(x+w/2+s/2,y+h*.82);c.lineTo(x+w/2-s/2,y+h*.82);c.fill();c.beginPath();c.moveTo(x+w-s,y);c.lineTo(x+w-s-s,y);c.lineTo(x+w/2-s/2,y+h*.82);c.lineTo(x+w/2+s/2,y+h*.82);c.fill();};

// 105: Inner Only — 内側の対角線だけ（外側なし）
D['105']=(c,x,y,w,h)=>{const s=w*.07;c.fillRect(x,y,s,h);c.fillRect(x+w-s,y,s,h);c.beginPath();c.moveTo(x+s,y+h);c.lineTo(x+s+s,y+h);c.lineTo(x+w/2+s/2,y+h*.18);c.lineTo(x+w/2-s/2,y+h*.18);c.fill();c.beginPath();c.moveTo(x+w-s,y+h);c.lineTo(x+w-s-s,y+h);c.lineTo(x+w/2-s/2,y+h*.18);c.lineTo(x+w/2+s/2,y+h*.18);c.fill();};

// 106: Convex Valley — 谷が膨らむ（逆U字）
D['106']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+s,y+h*.78);c.quadraticCurveTo(x+w/2,y+h*.30,x+w-s,y+h*.78);c.lineTo(x+w-s,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.86);c.quadraticCurveTo(x+w/2,y+h*.38,x+s,y+h*.86);c.lineTo(x+s,y+h);c.closePath();c.fill();};

// 107: Cross Stitch — ×印で構成
D['107']=(c,x,y,w,h)=>{const s=w*.04,n=6;c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s;c.lineCap='round';
const pts=[];
// Left vertical
for(let i=0;i<n;i++){const py=y+i*(h/(n-1));pts.push([x+s,py,'v']);}
// Right vertical
for(let i=0;i<n;i++){const py=y+i*(h/(n-1));pts.push([x+w-s,py,'v']);}
// Outer diag left
for(let i=0;i<n-1;i++){const t=(i+.5)/(n-1);pts.push([x+s+(w/2-s)*t,y+t*h*.82,'d']);}
// Outer diag right
for(let i=0;i<n-1;i++){const t=(i+.5)/(n-1);pts.push([x+w-s-(w/2-s)*t,y+t*h*.82,'d']);}
const cs=h/(n-1)*.35;
pts.forEach(([px,py])=>{c.beginPath();c.moveTo(px-cs,py-cs);c.lineTo(px+cs,py+cs);c.stroke();c.beginPath();c.moveTo(px+cs,py-cs);c.lineTo(px-cs,py+cs);c.stroke();});
c.restore();};

// 108: Bracket M — 角括弧で囲む
D['108']=(c,x,y,w,h)=>{const s=w*.05,bw=w*.08;
// Left bracket
c.fillRect(x-bw,y,bw,s);c.fillRect(x-bw,y,s,h);c.fillRect(x-bw,y+h-s,bw,s);
// Right bracket
c.fillRect(x+w,y,bw,s);c.fillRect(x+w+bw-s,y,s,h);c.fillRect(x+w,y+h-s,bw,s);
// M inside
c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s;c.lineCap='round';c.lineJoin='round';
c.beginPath();c.moveTo(x+s,y+h-s);c.lineTo(x+s,y+s);c.lineTo(x+w/2,y+h*.70);c.lineTo(x+w-s,y+s);c.lineTo(x+w-s,y+h-s);c.stroke();c.restore();};

// 109: Wave Peaks — 山頂が波型
D['109']=(c,x,y,w,h)=>{const s=w*.07,wave=h*.06;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+wave);
c.bezierCurveTo(x,y-wave*.5,x+s,y-wave*.5,x+s,y+wave);
c.lineTo(x+s,y+h*.14);c.lineTo(x+w/2,y+h*.88);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w-s,y+wave);
c.bezierCurveTo(x+w-s,y-wave*.5,x+w,y-wave*.5,x+w,y+wave);
c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.20);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.20);c.lineTo(x+s,y+h);c.closePath();c.fill();
// Outer diags
c.beginPath();c.moveTo(x+s,y+wave);c.lineTo(x+s+s,y+wave);c.lineTo(x+w/2+s*.3,y+h*.78);c.lineTo(x+w/2-s*.3,y+h*.78);c.fill();
c.beginPath();c.moveTo(x+w-s,y+wave);c.lineTo(x+w-s-s,y+wave);c.lineTo(x+w/2-s*.3,y+h*.78);c.lineTo(x+w/2+s*.3,y+h*.78);c.fill();};

// 110: Negative Diamond — ダイヤ型にネガ
D['110']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();stdM(c,x,y,w,h);c.fill();
const dw=w*.45,dh=h*.45;c.save();c.globalCompositeOperation='destination-out';
c.beginPath();c.moveTo(x+w/2,y+h/2-dh/2);c.lineTo(x+w/2+dw/2,y+h/2);c.lineTo(x+w/2,y+h/2+dh/2);c.lineTo(x+w/2-dw/2,y+h/2);c.closePath();c.fill();c.restore();
// Re-draw M strokes that cross the diamond
c.save();c.beginPath();c.moveTo(x+w/2,y+h/2-dh/2);c.lineTo(x+w/2+dw/2,y+h/2);c.lineTo(x+w/2,y+h/2+dh/2);c.lineTo(x+w/2-dw/2,y+h/2);c.closePath();c.clip();
c.strokeStyle=c.fillStyle;c.lineWidth=s*.6;c.lineJoin='miter';
c.beginPath();c.moveTo(x+s/2,y);c.lineTo(x+w/2,y+h*.78);c.lineTo(x+w-s/2,y);c.stroke();
c.beginPath();c.moveTo(x+s/2,y+h);c.lineTo(x+w/2,y+h*.22);c.lineTo(x+w-s/2,y+h);c.stroke();
c.restore();};

// 111: Mitered Corners — 45度マイター
D['111']=(c,x,y,w,h)=>{const s=w*.07,m=s*1.2;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s+m,y);c.lineTo(x+s,y+m);c.lineTo(x+s,y+h*.14);c.lineTo(x+w/2,y+h*.88);c.lineTo(x+w-s,y+h*.14);c.lineTo(x+w-s,y+m);c.lineTo(x+w-s-m,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s-m,y+h);c.lineTo(x+w-s,y+h-m);c.lineTo(x+w-s,y+h*.20);c.lineTo(x+w/2,y+h*.92);c.lineTo(x+s,y+h*.20);c.lineTo(x+s,y+h-m);c.lineTo(x+s+m,y+h);c.closePath();c.fill();};

// 112: Triangulated — 三角形のファセットで構成
D['112']=(c,x,y,w,h)=>{const s=w*.06;c.save();c.strokeStyle=c.fillStyle;c.lineWidth=s*.4;c.lineJoin='round';
// Points
const p=[[0,0],[1,0],[.5,.78],[0,1],[1,1],[.5,.22],[.25,.39],[.75,.39],[.25,.61],[.75,.61]];
const tris=[[0,1,2],[0,2,3],[1,2,4],[0,6,3],[1,7,4],[3,5,8],[4,5,9],[6,2,8],[7,2,9],[5,8,9],[2,6,7],[5,6,7]];
tris.forEach(([a,b,cc])=>{const [ax,ay]=p[a],[bx,by]=p[b],[cx2,cy]=p[cc];
c.beginPath();c.moveTo(x+ax*w,y+ay*h);c.lineTo(x+bx*w,y+by*h);c.lineTo(x+cx2*w,y+cy*h);c.closePath();c.stroke();});
// Fill key triangles
c.globalAlpha=.15;
[[0,6,3],[1,7,4],[0,1,2]].forEach(([a,b,cc])=>{const [ax,ay]=p[a],[bx,by]=p[b],[cx2,cy]=p[cc];c.beginPath();c.moveTo(x+ax*w,y+ay*h);c.lineTo(x+bx*w,y+by*h);c.lineTo(x+cx2*w,y+cy*h);c.closePath();c.fill();});
c.restore();};

// 113: Split Horizontal — 上下に分割して隙間
D['113']=(c,x,y,w,h)=>{const s=w*.07,gap=h*.04;
c.save();c.beginPath();c.rect(x-s,y,w+s*2,h/2-gap/2);c.clip();c.beginPath();stdM(c,x,y,w,h);c.fill();c.restore();
c.save();c.beginPath();c.rect(x-s,y+h/2+gap/2,w+s*2,h/2);c.clip();c.beginPath();stdM(c,x,y,w,h);c.fill();c.restore();};

// 114: Dovetail — 蟻継ぎの接合部
D['114']=(c,x,y,w,h)=>{const s=w*.07,dw=s*.8,dh=h*.06,dn=3;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);
// Dovetails on inner edge of left vertical
for(let i=0;i<dn;i++){const dy=y+h*.15+i*(h*.25);c.lineTo(x+s,dy);c.lineTo(x+s+dw,dy+dh*.3);c.lineTo(x+s+dw,dy+dh*1.7);c.lineTo(x+s,dy+dh*2);}
c.lineTo(x+s,y+h);c.closePath();c.fill();
// Right vertical with dovetails
c.beginPath();c.moveTo(x+w,y+h);c.lineTo(x+w,y);c.lineTo(x+w-s,y);
for(let i=0;i<dn;i++){const dy=y+h*.15+i*(h*.25);c.lineTo(x+w-s,dy);c.lineTo(x+w-s-dw,dy+dh*.3);c.lineTo(x+w-s-dw,dy+dh*1.7);c.lineTo(x+w-s,dy+dh*2);}
c.lineTo(x+w-s,y+h);c.closePath();c.fill();
// Diagonals
c.beginPath();c.moveTo(x+s,y);c.lineTo(x+s+s,y);c.lineTo(x+w/2+s*.3,y+h*.78);c.lineTo(x+w/2-s*.3,y+h*.78);c.fill();
c.beginPath();c.moveTo(x+w-s,y);c.lineTo(x+w-s-s,y);c.lineTo(x+w/2-s*.3,y+h*.78);c.lineTo(x+w/2+s*.3,y+h*.78);c.fill();
c.beginPath();c.moveTo(x+s,y+h);c.lineTo(x+s+s,y+h);c.lineTo(x+w/2+s*.3,y+h*.22);c.lineTo(x+w/2-s*.3,y+h*.22);c.fill();
c.beginPath();c.moveTo(x+w-s,y+h);c.lineTo(x+w-s-s,y+h);c.lineTo(x+w/2-s*.3,y+h*.22);c.lineTo(x+w/2+s*.3,y+h*.22);c.fill();};

// 115: River Valley — 谷が川のように蛇行
D['115']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y);c.lineTo(x+s,y);c.lineTo(x+s,y+h*.12);
c.bezierCurveTo(x+s,y+h*.35,x+w*.4,y+h*.30,x+w/2,y+h*.50);
c.bezierCurveTo(x+w*.6,y+h*.70,x+w-s,y+h*.65,x+w-s,y+h*.12);
c.lineTo(x+w-s,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h);c.lineTo(x+w-s,y+h);c.lineTo(x+w-s,y+h*.20);
c.bezierCurveTo(x+w-s,y+h*.73,x+w*.6,y+h*.78,x+w/2,y+h*.58);
c.bezierCurveTo(x+w*.4,y+h*.38,x+s,y+h*.43,x+s,y+h*.20);
c.lineTo(x+s,y+h);c.closePath();c.fill();};

// 116: Flame — 炎のような有機形状
D['116']=(c,x,y,w,h)=>{const s=w*.06;c.beginPath();c.moveTo(x+s*.5,y+h);
c.bezierCurveTo(x-s,y+h*.5,x+s*.5,y+h*.1,x+s*1.5,y);
c.lineTo(x+s*2.5,y);
c.bezierCurveTo(x+s*1.5,y+h*.15,x+s,y+h*.3,x+s,y+h*.15);
c.lineTo(x+w/2,y+h*.75);
c.lineTo(x+w-s,y+h*.15);
c.bezierCurveTo(x+w-s,y+h*.3,x+w-s*1.5,y+h*.15,x+w-s*2.5,y);
c.lineTo(x+w-s*1.5,y);
c.bezierCurveTo(x+w-s*.5,y+h*.1,x+w+s,y+h*.5,x+w-s*.5,y+h);
c.lineTo(x+w-s*1.5,y+h);
c.lineTo(x+w-s,y+h*.20);c.lineTo(x+w/2,y+h*.88);c.lineTo(x+s,y+h*.20);
c.lineTo(x+s*1.5,y+h);c.closePath();c.fill();};

// 117: Venetian Blind — ブラインド（水平スリット）
D['117']=(c,x,y,w,h)=>{const s=w*.07,n=7,slat=h/n*.55;
c.beginPath();stdM(c,x,y,w,h);c.fill();
c.save();c.globalCompositeOperation='destination-out';
for(let i=1;i<n;i++){c.fillRect(x-s,y+i*(h/n)-slat*.3,w+s*2,slat*.6);}
c.restore();};

// 118: Marquee — 電飾看板（外周にドット）
D['118']=(c,x,y,w,h)=>{const s=w*.07;c.beginPath();stdM(c,x,y,w,h);c.fill();
// Dots around outline
c.save();c.globalCompositeOperation='destination-out';const r=s*.35;
const outline=[[0,0],[0,1],[s,1],[s,h*.14/h],[w/2,h*.92/h],[w-s,h*.14/h],[w-s,1],[w,1],[w,0],[w-s,0],[w/2,h*.78/h],[s,0]];
const dots=[];outline.forEach(([px,py],i)=>{const [nx,ny]=outline[(i+1)%outline.length];const d=Math.sqrt((nx-px)**2+(ny-py)**2)*Math.max(w,h);const steps=Math.max(2,Math.floor(d/8));for(let j=0;j<steps;j++){const t=j/steps;dots.push([x+px*w+(nx-px)*w*t,y+py*h+(ny-py)*h*t]);}});
c.restore();
// Draw dots on top instead
c.save();const fg=c.fillStyle;
dots.forEach(([dx,dy])=>{c.fillStyle='#EDEDE9';c.beginPath();c.arc(dx,dy,r,0,Math.PI*2);c.fill();});
c.restore();};

// 119: Tapered Round — テーパー + ラウンドバレー
D['119']=(c,x,y,w,h)=>{const thick=w*.09,thin=w*.035;
c.beginPath();c.moveTo(x,y);c.lineTo(x+thin,y);c.lineTo(x+thin,y+h*.15);
c.quadraticCurveTo(x+w/2,y+h*.88,x+w-thin,y+h*.15);
c.lineTo(x+w-thin,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h*.02);
c.lineTo(x+w-thick+thin,y+h);c.lineTo(x+w-thick,y+h);c.lineTo(x+w-thin,y+h*.22);
c.quadraticCurveTo(x+w/2,y+h*.96,x+thin,y+h*.22);
c.lineTo(x+thick,y+h);c.lineTo(x+thick-thin,y+h);c.lineTo(x,y+h*.02);
c.closePath();c.fill();};

// 120: Stacked Lines — 水平線の積み重ねでMを表現
D['120']=(c,x,y,w,h)=>{const n=11,lh=h/n*.5;
for(let i=0;i<n;i++){const t=i/(n-1),ry=y+i*(h/(n-1))-lh/2;
// Left vertical bar
c.fillRect(x,ry,w*.08,lh);
// Right vertical bar
c.fillRect(x+w-w*.08,ry,w*.08,lh);
// Outer left diagonal position
const dlx=x+w*.08+(w/2-w*.08)*t;

// 129: Möbius — メビウスの帯風ねじれ
D['129']=(c,x,y,w,h)=>{const s=w*.07;

function renderWordmark(canvas,drawFn){const dpr=window.devicePixelRatio||2,fs=48,font=`200 ${fs}px Outfit`,ls=fs*.35,color='#1B4332',chars=['M','A','T','C','H','A','&','M','E'];const ctx=canvas.getContext('2d');ctx.font=font;const cw=chars.map(c=>ctx.measureText(c).width),tw=cw.reduce((a,b)=>a+b,0)+ls*(chars.length-1);const m=ctx.measureText('M'),asc=m.actualBoundingBoxAscent,desc=m.actualBoundingBoxDescent;const px=40,py=20,W=tw+px*2,H=asc+desc+py*2;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(dpr,dpr);const by=py+asc;ctx.font=font;ctx.fillStyle=color;ctx.textBaseline='alphabetic';let cx=px;chars.forEach((ch,i)=>{if(ch==='M')drawFn(ctx,cx,by-asc,cw[i],asc);else ctx.fillText(ch,cx,by);cx+=cw[i]+ls;});}
function renderMark(canvas,drawFn,bg,fg){const dpr=window.devicePixelRatio||2,sz=72;canvas.width=sz*dpr;canvas.height=sz*dpr;canvas.style.width=sz+'px';canvas.style.height=sz+'px';const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.fillStyle=bg;ctx.fillRect(0,0,sz,sz);const ms=34,p=(sz-ms)/2;ctx.fillStyle=fg;drawFn(ctx,p,p+1,ms,ms-2);}
function build(){const app=document.getElementById('app');let html='';CONCEPTS.forEach(c=>{if(c.divider)html+=`<div class="divider">${c.divider}</div>`;html+=`<div class="concept"><div class="concept-header"><h2>${c.name}</h2><span class="tag">${c.tag}</span></div><p class="desc">${c.desc}</p><div class="wordmark-canvas-wrap"><canvas id="wm-${c.id}"></canvas></div><div class="mark-display"><div class="mark-cell"><div class="box light"><canvas id="mk-${c.id}-l"></canvas></div><div class="label">light</div></div><div class="mark-cell"><div class="box dark"><canvas id="mk-${c.id}-d"></canvas></div><div class="label">dark</div></div><div class="mark-cell"><div class="box green"><canvas id="mk-${c.id}-g"></canvas></div><div class="label">sage</div></div><div class="mark-cell"><div class="box pink"><canvas id="mk-${c.id}-p"></canvas></div><div class="label">sakura</div></div></div></div>`;});app.innerHTML=html;document.fonts.ready.then(()=>{CONCEPTS.forEach(c=>{const fn=D[c.id];renderWordmark(document.getElementById(`wm-${c.id}`),fn);renderMark(document.getElementById(`mk-${c.id}-l`),fn,'#FAFAF8','#1B4332');renderMark(document.getElementById(`mk-${c.id}-d`),fn,'#1B4332','#F5F0E8');renderMark(document.getElementById(`mk-${c.id}-g`),fn,'#8AAE92','#1B4332');renderMark(document.getElementById(`mk-${c.id}-p`),fn,'#F2C4C4','#1B4332');});});}
build();
