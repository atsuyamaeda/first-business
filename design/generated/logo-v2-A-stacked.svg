<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#ffffff"/>
  <!-- Concept A: Stacked Typography — "matcha" / "&" / "me" -->
  <!-- matcha: ultra-thin geometric sans-serif, wide tracking -->
  <!-- &: contrasting italic serif, the soul of the brand -->
  <!-- me: same as matcha -->
  <text x="200" y="105" text-anchor="middle"
        font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
        font-weight="200" font-size="28" letter-spacing="12" fill="#1B4332">
    matcha
  </text>
  <text x="200" y="155" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif"
        font-weight="300" font-style="italic" font-size="38" fill="#1B4332">
    &amp;
  </text>
  <text x="200" y="205" text-anchor="middle"
        font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
        font-weight="200" font-size="28" letter-spacing="12" fill="#1B4332">
    me
  </text>
</svg>
