<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <!--
    matcha & me — Dark Background Version
    パッケージ・暗い背景での使用
  -->
  <rect width="720" height="200" fill="#1A1A1A"/>

  <!-- matcha -->
  <text x="40" y="118"
        font-family="'Futura', 'Century Gothic', 'Avenir Next', 'Helvetica Neue', sans-serif"
        font-weight="300"
        font-size="56"
        letter-spacing="12"
        fill="#F2F0EB">matcha</text>

  <!-- Ensō + & brand mark -->
  <g transform="translate(398, 100)">
    <!-- 円相 -->
    <path d="M 13 -24
             A 27 27 0 1 1 -13 -24"
          fill="none"
          stroke="#5A9B6E"
          stroke-width="2.4"
          stroke-linecap="round"
          opacity="0.9"/>

    <!-- 筆圧 -->
    <path d="M -26 6
             A 27 27 0 0 1 -6 27
             A 27 27 0 0 1 18 22"
          fill="none"
          stroke="#5A9B6E"
          stroke-width="4.8"
          stroke-linecap="round"
          opacity="0.22"/>

    <!-- 入筆点 -->
    <circle cx="13" cy="-24" r="1.6" fill="#5A9B6E" opacity="0.5"/>

    <!-- & -->
    <text x="0" y="6"
          text-anchor="middle"
          font-family="'Didot', 'Bodoni MT', 'Baskerville', 'Georgia', serif"
          font-weight="400"
          font-style="italic"
          font-size="36"
          fill="#F2F0EB">&amp;</text>
  </g>

  <!-- me -->
  <text x="460" y="118"
        font-family="'Futura', 'Century Gothic', 'Avenir Next', 'Helvetica Neue', sans-serif"
        font-weight="300"
        font-size="56"
        letter-spacing="12"
        fill="#F2F0EB">me</text>
</svg>