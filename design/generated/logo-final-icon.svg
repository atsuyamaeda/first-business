<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!--
    matcha & me — Icon Mark
    円相 + & の単独マーク（favicon / SNS / app icon）
  -->
  <rect width="160" height="160" fill="#FAFAF8"/>

  <g transform="translate(80, 76)">
    <!-- 円相 -->
    <path d="M 18 -34
             A 38 38 0 1 1 -18 -34"
          fill="none"
          stroke="#3A6B4E"
          stroke-width="3.2"
          stroke-linecap="round"
          opacity="0.9"/>

    <!-- 筆圧 -->
    <path d="M -36 10
             A 38 38 0 0 1 -10 37
             A 38 38 0 0 1 24 30"
          fill="none"
          stroke="#3A6B4E"
          stroke-width="6.5"
          stroke-linecap="round"
          opacity="0.18"/>

    <!-- 入筆点 -->
    <circle cx="18" cy="-34" r="2.2" fill="#3A6B4E" opacity="0.45"/>

    <!-- & -->
    <text x="0" y="10"
          text-anchor="middle"
          font-family="'Didot', 'Bodoni MT', 'Baskerville', 'Georgia', serif"
          font-weight="400"
          font-style="italic"
          font-size="50"
          fill="#1A1A1A">&amp;</text>
  </g>
</svg>