<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    LOGO G — Icon Version (favicon / SNS icon / app icon)
    円相＋& の単独マーク
  -->
  <rect width="200" height="200" fill="#FAFAF8"/>

  <g transform="translate(100, 96)">
    <!-- 円相 -->
    <path d="M 22 -40
             A 46 46 0 1 1 -22 -40"
          fill="none"
          stroke="#3A6B4E"
          stroke-width="3.8"
          stroke-linecap="round"
          opacity="0.85"/>

    <!-- 筆圧の重み -->
    <path d="M -39 18
             A 46 46 0 0 1 -22 39
             A 46 46 0 0 1 8 46"
          fill="none"
          stroke="#3A6B4E"
          stroke-width="7.5"
          stroke-linecap="round"
          opacity="0.2"/>

    <!-- 筆の入り -->
    <circle cx="22" cy="-40" r="2.5" fill="#3A6B4E" opacity="0.5"/>

    <!-- & -->
    <text x="0" y="12"
          text-anchor="middle"
          font-family="'Didot', 'Bodoni MT', 'Baskerville', 'Georgia', serif"
          font-weight="400"
          font-style="italic"
          font-size="58"
          fill="#1A1A1A">&amp;</text>
  </g>
</svg>