<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <!--
    matcha & me — Final Logo (Horizontal Wordmark)
    円相（えんそう）+ & のブランドマーク
  -->
  <rect width="720" height="200" fill="#FAFAF8"/>

  <!-- matcha -->
  <text x="40" y="118"
        font-family="'Futura', 'Century Gothic', 'Avenir Next', 'Helvetica Neue', sans-serif"
        font-weight="300"
        font-size="56"
        letter-spacing="12"
        fill="#1A1A1A">matcha</text>

  <!-- Ensō + & brand mark -->
  <g transform="translate(398, 100)">
    <!-- 円相 — 筆のひと筆 -->
    <!-- Layer 1: メインの弧 -->
    <path d="M 13 -24
             A 27 27 0 1 1 -13 -24"
          fill="none"
          stroke="#3A6B4E"
          stroke-width="2.4"
          stroke-linecap="round"
          opacity="0.9"/>

    <!-- Layer 2: 筆圧 — 左下〜下部が太い -->
    <path d="M -26 6
             A 27 27 0 0 1 -6 27
             A 27 27 0 0 1 18 22"
          fill="none"
          stroke="#3A6B4E"
          stroke-width="4.8"
          stroke-linecap="round"
          opacity="0.18"/>

    <!-- Layer 3: 入筆点 -->
    <circle cx="13" cy="-24" r="1.6" fill="#3A6B4E" opacity="0.45"/>

    <!-- & -->
    <text x="0" y="6"
          text-anchor="middle"
          font-family="'Didot', 'Bodoni MT', 'Baskerville', 'Georgia', serif"
          font-weight="400"
          font-style="italic"
          font-size="36"
          fill="#1A1A1A">&amp;</text>
  </g>

  <!-- me -->
  <text x="460" y="118"
        font-family="'Futura', 'Century Gothic', 'Avenir Next', 'Helvetica Neue', sans-serif"
        font-weight="300"
        font-size="56"
        letter-spacing="12"
        fill="#1A1A1A">me</text>
</svg>