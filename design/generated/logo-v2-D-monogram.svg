<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#ffffff"/>
  <!-- Concept D: m&m Monogram — compact mark + full name below -->
  <!-- Monogram -->
  <text x="200" y="175" text-anchor="middle" fill="#1B4332">
    <tspan font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
           font-weight="200" font-size="52" letter-spacing="2">m</tspan>
    <tspan font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif"
           font-weight="300" font-style="italic" font-size="52">&amp;</tspan>
    <tspan font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
           font-weight="200" font-size="52" letter-spacing="2">m</tspan>
  </text>
  <!-- Full name below -->
  <text x="200" y="230" text-anchor="middle" fill="#1B4332">
    <tspan font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
           font-weight="200" font-size="11" letter-spacing="6">matcha </tspan>
    <tspan font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif"
           font-weight="300" font-style="italic" font-size="12">&amp;</tspan>
    <tspan font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
           font-weight="200" font-size="11" letter-spacing="6"> me</tspan>
  </text>
</svg>
