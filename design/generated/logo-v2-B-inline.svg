<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <rect width="500" height="200" fill="#ffffff"/>
  <!-- Concept B: Single Line Inline — "matcha & me" with & in italic serif -->
  <text x="250" y="108" text-anchor="middle" fill="#1B4332">
    <tspan font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
           font-weight="200" font-size="26" letter-spacing="8">matcha </tspan>
    <tspan font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif"
           font-weight="300" font-style="italic" font-size="28">&amp; </tspan>
    <tspan font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
           font-weight="200" font-size="26" letter-spacing="8">me</tspan>
  </text>
</svg>
