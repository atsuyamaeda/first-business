<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <rect width="500" height="300" fill="#ffffff"/>
  <!-- Concept K: Copperplate Gothic — stacked layout -->
  <text x="250" y="120" text-anchor="middle"
        font-family="'Copperplate', 'Copperplate Gothic Light', 'Copperplate Gothic', serif"
        font-weight="300" font-size="28" letter-spacing="14" fill="#1B4332">
    MATCHA
  </text>
  <text x="250" y="160" text-anchor="middle"
        font-family="'Copperplate', 'Copperplate Gothic Light', 'Copperplate Gothic', serif"
        font-weight="300" font-size="22" letter-spacing="10" fill="#1B4332">
    &amp;
  </text>
  <text x="250" y="200" text-anchor="middle"
        font-family="'Copperplate', 'Copperplate Gothic Light', 'Copperplate Gothic', serif"
        font-weight="300" font-size="28" letter-spacing="14" fill="#1B4332">
    ME
  </text>
</svg>
